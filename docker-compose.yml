name: maskproxy

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"   # 5432 is already in use by a local Postgres install
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - maskproxy

  # ── Redis ───────────────────────────────────────────────────────────────────
  cache:
    image: redis:8-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - maskproxy

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: apps/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    volumes:
      # Hot-reload: mount source over the image copy
      - ./apps/backend:/app
      # Keep the container's site-packages intact
      - /app/.venv
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    networks:
      - maskproxy

  # ── Next.js frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: apps/frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # Server-side only — used by Next.js rewrites, never sent to the browser
      BACKEND_URL: http://backend:8000
    volumes:
      # Hot-reload: mount source over the image copy
      - ./apps/frontend:/app
      # Keep node_modules from the image intact
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - maskproxy

  # ── Python proxy (behavioral spec for later Rust rewrite) ──────────────────
  proxy:
    build:
      context: apps/proxy
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8080", "--reload"]
    env_file: .env
    environment:
      REDIS_URL: ${REDIS_URL}
      UPSTREAM_BASE_URL: ${UPSTREAM_BASE_URL}
      UPSTREAM_API_KEY: ${UPSTREAM_API_KEY}
      MAPPING_TTL_SECONDS: ${MAPPING_TTL_SECONDS}
      MAX_BODY_BYTES: ${MAX_BODY_BYTES}
      ROUTING_ENABLED: ${ROUTING_ENABLED}
      LOCAL_UPSTREAM_BASE_URL: ${LOCAL_UPSTREAM_BASE_URL}
      ROUTING_STRATEGY: ${ROUTING_STRATEGY}
      ROUTING_DEFAULT_TARGET: ${ROUTING_DEFAULT_TARGET}
      ROUTING_LOCAL_KEYWORDS: ${ROUTING_LOCAL_KEYWORDS}
      ROUTING_SIMILARITY_THRESHOLD: ${ROUTING_SIMILARITY_THRESHOLD}
      ROUTING_TOP_K: ${ROUTING_TOP_K}
      ROUTING_EMBEDDING_BACKEND: ${ROUTING_EMBEDDING_BACKEND}
      ROUTING_EMBEDDING_MODEL_ID: ${ROUTING_EMBEDDING_MODEL_ID}
      ROUTING_EMBEDDING_MODEL_PATH: ${ROUTING_EMBEDDING_MODEL_PATH}
      ROUTING_EMBEDDING_TOKENIZER_PATH: ${ROUTING_EMBEDDING_TOKENIZER_PATH}
      ROUTING_EMBEDDING_PROVIDERS: ${ROUTING_EMBEDDING_PROVIDERS}
      ROUTING_STORE_BACKEND: ${ROUTING_STORE_BACKEND}
      ROUTING_EXAMPLES_PATH: ${ROUTING_EXAMPLES_PATH}
      ROUTING_LANCEDB_URI: ${ROUTING_LANCEDB_URI}
      ROUTING_LANCEDB_TABLE: ${ROUTING_LANCEDB_TABLE}
      NER_ENABLED: ${NER_ENABLED}
      NER_BACKEND: ${NER_BACKEND}
      NER_MODEL_ID: ${NER_MODEL_ID}
      NER_ONNX_MODEL_PATH: ${NER_ONNX_MODEL_PATH}
      NER_ONNX_TOKENIZER_PATH: ${NER_ONNX_TOKENIZER_PATH}
      NER_ONNX_LABELS_PATH: ${NER_ONNX_LABELS_PATH}
      NER_ONNX_PROVIDERS: ${NER_ONNX_PROVIDERS}
      NER_CONFIDENCE_THRESHOLD: ${NER_CONFIDENCE_THRESHOLD}
    volumes:
      - ./apps/proxy:/app
    ports:
      - "8080:8080"
    depends_on:
      cache:
        condition: service_healthy
    networks:
      - maskproxy

volumes:
  db_data:
  redis_data:

networks:
  maskproxy:
    driver: bridge
